; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Versión y opciones (única fuente de verdad, se inyecta vía build_flags)
; YAI_VERSION: versión del firmware
; DEVICE_DESCRIPTION: nombre legible en discovery UDP (sin espacios por limitación de build_flags)
; UDP_DISCOVERY_LOGS_ENABLED: 1 = logs UDP >> visibles, 0 = ocultos (default)
[env]
build_flags =
	-DYAI_VERSION=\"1.5.8-YUS-COSTA\"
	-DDEVICE_DESCRIPTION=\"EstanqueCosta\"
	-DUDP_DISCOVERY_LOGS_ENABLED=0
lib_deps =
	knolleary/PubSubClient @ 2.8
	bblanchon/ArduinoJson@^6.20.1
	arduino-libraries/NTPClient@^3.2.1

; [env:uno]
; platform = atmelavr
; board = uno
; framework = arduino

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

[env:esp32]
platform = espressif32
board = esp32-pro
framework = arduino
monitor_speed = 115200

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Tests unitarios: pio test -e esp32_test
[env:esp32_test]
platform = espressif32
board = esp32-pro
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
test_framework = unity

; Tests en NodeMCU: pio test -e nodemcuv2_test
[env:nodemcuv2_test]
platform = espressif8266
board = nodemcuv2
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
test_framework = unity
